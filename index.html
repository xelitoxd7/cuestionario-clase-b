<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuestionario Clase B</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        .pregunta { margin-bottom: 25px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        .aviso { font-weight: bold; color: #d35400; font-size: 0.9em; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        #menu { margin-bottom: 20px; padding: 20px; background: #f4f4f4; border-radius: 8px; }
        .feedback { font-size: 1.2em; font-weight: bold; }
        img { max-width: 100px; height: auto; display: block; margin: 10px auto; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>CUESTIONARIO CLASE B</h1>
    <div id="menu">
        <button onclick="iniciarCuestionario()">Iniciar Cuestionario Completo</button>
    </div>

    <div id="contenedor-preguntas"></div>
    <div id="contenedor-botones-finales"></div>

    <script>
        const bancoDePreguntas = [
            { p: "Su vehículo se desvía hacia un lado cuando usted frena. Usted debería:", o: ["Cambiar los neumáticos.", "Bombear el pedal.", "Usar freno de mano.", "Consultar con su mecánico."], c: [3], tipo: "una" },
            { p: "Su vehículo se desvía hacia un lado cuando usted frena. ¿Falla más probable?", o: ["Nivel líquido.", "Freno mano puesto.", "Frenos mal ajustados.", "Presión neumáticos."], c: [2], tipo: "una" },
            { p: "Mientras conduce siente un fuerte olor a gasolina. ¿Qué debe hacer?", o: ["No preocuparse.", "Velocidad reducida.", "Continuar.", "Detenerse e investigar."], c: [3], tipo: "una" },
            { p: "¿Cómo puede prevenir usted el riesgo de incendio de su vehículo?", o: ["Niveles agua.", "Estanque lleno.", "Gasolina sin plomo.", "Revisar olor a gasolina."], c: [3], tipo: "una" },
            { p: "¿Por qué es importante usar zapatos apropiados cuando conduce?", o: ["Control de pedales.", "Desgaste gomas.", "Cambios rápido.", "Caminar mejor."], c: [0], tipo: "una" },
            { p: "En un automóvil, ¿cuál de los siguientes elementos reduce el riesgo de lesiones de cuello en una colisión?", o: ["Air-bag.", "Frenos ABS.", "Columna dirección.", "Apoya-cabeza."], c: [3], tipo: "una" },
            { p: '¿Qué significa esta luz de advertencia?<br><img src="https://raw.githubusercontent.com/xelitoxd7/cuestionario-clase-b/refs/heads/main/pregunta7.jpg">', o: ["Neblineras.", "Advertencia peligro.", "Luces altas.", "Freno mano."], c: [1], tipo: "una" },
            { p: "Es esencial que la presión de los neumáticos sea chequeada regularmente. ¿Cuándo?", o: ["Viaje largo.", "Alta velocidad.", "Neumáticos fríos.", "Neumáticos calientes."], c: [2], tipo: "una" },
            { p: "La presión de los neumáticos debe revisarse:", o: ["Fríos.", "Calientes.", "Cualquier momento."], c: [0], tipo: "una" },
            { p: "¿Cuál de estos líquidos, en el caso de estar bajo, podría causar accidente?", o: ["Líquido freno.", "Anticongelante.", "Agua batería.", "Refrigerante."], c: [0], tipo: "una" },
            { p: "Frente a situación normal, ¿forma más segura de frenar?", o: ["Freno fuerte.", "Suave con embrague.", "Neutro.", "Progresivo."], c: [3], tipo: "una" },
            { p: "¿Cuándo usaría las luces intermitentes de advertencia?", o: ["Pana obstruyendo.", "Doble fila.", "Línea amarilla.", "Señalizadores malos."], c: [0], tipo: "una" },
            { p: "Las luces de advertencia de peligro deberían ser usadas:", o: ["Doble fila.", "Advertir peligro.", "Virar.", "Prisa."], c: [1], tipo: "una" },
            { p: "¿Cuándo usaría las luces de advertencia de peligro?", o: ["Pana lenta.", "Remolcado.", "Retrocediendo.", "Pana obstruyendo."], c: [3], tipo: "una" },
            { p: "Suspension rebota u oscila al cargar. ¿Qué significa?", o: ["Neumáticos gastados.", "Neumáticos poco inflados.", "Volante mal.", "Amortiguadores gastados."], c: [3], tipo: "una" },
            { p: "¿Por qué los neumáticos deben mantenerse a la presión indicada?", o: ["Altura.", "Desgastar motor.", "Evitar ronceo.", "Inclinación."], c: [2], tipo: "una" },
            { p: "¿A qué se debe un alto consumo de combustible?", o: ["Dirección.", "Aceleración curvas.", "Frenadas y aceleraciones.", "Marchas altas."], c: [2], tipo: "una" },
            { p: "Profundidad surcos no debería ser inferior a:", o: ["5.0 mm", "4.0 mm", "1.6 mm", "1.0 mm"], c: [2], tipo: "una" },
            { p: "Uno de sus neumáticos traseros se revienta. ¿Qué debe hacer?", o: ["Frenar fondo.", "Detenerse lento.", "Marcha atrás.", "Señal."], c: [1], tipo: "una" },
            { p: "¿Qué debe hacer si se le revienta un neumático delantero?", o: ["Cambiarse pista.", "Frenar suave/seguir.", "Frenar firme.", "Sostener volante."], c: [1], tipo: "una" },
            { p: "¿Qué es lo que nunca debería hacer en una bomba de bencina?", o: ["Circular.", "Fumar.", "Comer.", "Lavar."], c: [1], tipo: "una" },
            { p: "Desenganchar el motor del vehículo...", o: ["Mejor control.", "Maniobras.", "Más consumo.", "Reduce control."], c: [3], tipo: "una" },
            { p: "¿Por qué no es bueno desenganchar el motor al ir circulando?", o: ["Resbala.", "Motor se detiene.", "No hay frenado motor.", "Motor rápido."], c: [2], tipo: "una" },
            { p: "¿Por qué no debe desengancharse el motor al ir cuesta abajo?", o: ["Menor control.", "Velocidad.", "Consumo.", "Daño."], c: [0], tipo: "una" }
        ];

        function iniciarCuestionario() {
            document.getElementById('menu').style.display = 'none';
            let html = "";
            bancoDePreguntas.forEach((p, index) => {
                let aviso = p.tipo === "una" ? "Marque una opción" : "Marque las opciones correctas";
                html += `<div class="pregunta" id="pregunta-${index}">
                    <p><strong>${index + 1}. ${p.pregunta}</strong> <br><span class="aviso">(${aviso})</span></p>`;
                p.o.forEach((op, i) => {
                    html += `<input type="checkbox" name="p${index}" value="${i}"> ${op}<br>`;
                });
                html += `<br><span class="feedback" id="feedback-${index}"></span></div>`;
            });
            html += `<button onclick="verificar()">Calificar</button>`;
            document.getElementById('contenedor-preguntas').innerHTML = html;
        }

        function verificar() {
            bancoDePreguntas.forEach((p, index) => {
                const marcadas = Array.from(document.querySelectorAll(`input[name="p${index}"]:checked`)).map(el => parseInt(el.value));
                const feedback = document.getElementById(`feedback-${index}`);
                const correcta = p.c.every(c => marcadas.includes(c)) && marcadas.length === p.c.length;
                feedback.innerHTML = correcta ? " ✅ Correcto" : " ❌ Incorrecto";
            });
        }
    </script>
</body>
</html>
