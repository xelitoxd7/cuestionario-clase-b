<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuestionario Clase B</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        .pregunta { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        #menu { margin-bottom: 20px; padding: 20px; background: #f4f4f4; border-radius: 8px; }
        .feedback { font-size: 1.2em; font-weight: bold; }
        img { max-width: 100%; height: auto; display: block; margin: 10px auto; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>CUESTIONARIO CLASE B</h1>

    <div id="menu">
        <button onclick="iniciarCuestionario()">Iniciar Cuestionario Completo</button>
        <button onclick="preguntasAlAzar()">Preguntas al azar (10)</button>
    </div>

    <div id="contenedor-preguntas"></div>
    <div id="contenedor-botones-finales"></div>

    <script>
        const bancoDePreguntas = [
            { pregunta: "Su vehículo se desvía hacia un lado cuando usted frena. Usted debería:", opciones: ["Cambiar los neumáticos de un lado hacia el otro y viceversa.", "Bombear el pedal al frenar.", "Usar su freno de mano.", "Consultar con su mecánico lo antes posible."], correcta: 3 },
            { pregunta: "Su vehículo se desvía hacia un lado cuando usted frena. ¿Cuál es la falla más probable?", opciones: ["Un bajo nivel del líquido de frenos.", "Su freno de mano está todavía puesto.", "Frenos mal ajustados.", "Neumáticos con presión de aire inadecuada."], correcta: 2 },
            { pregunta: "Mientras conduce usted siente un fuerte olor a gasolina. ¿Qué debería hacer usted?", opciones: ["No preocuparse, ya que sólo son los gases de escape.", "Continuar a una velocidad reducida.", "Continuar porque sabe que se detendrá algunos kilómetros más allá.", "Detenerse e investigar el problema."], correcta: 3 },
            { pregunta: "¿Cómo puede prevenir usted el riesgo de incendio de su vehículo?", opciones: ["Manteniendo los niveles de agua sobre el máximo.", "Evitando conducir con el estanque lleno de combustible.", "Usando gasolina sin plomo.", "Revisando su vehículo ante cualquier olor a gasolina extraño."], correcta: 3 },
            { pregunta: "¿Por qué es importante usar zapatos apropiados cuando conduce?", opciones: ["Para tener un adecuado control de los pedales.", "Para evitar el desgaste acelerado de las gomas de los pedales.", "Para poder efectuar los cambios de marcha más rápidamente.", "Para poder caminar sin problemas en el caso que necesite solicitar ayuda."], correcta: 0 },
            { pregunta: "En un automóvil, ¿cuál de los siguientes elementos reduce el riesgo de lesiones de cuello en una colisión?", opciones: ["Un asiento dotado de air-bag (bolsa de aire).", "Los frenos ABS.", "Una columna de dirección colapsable.", "Un asiento con apoya-cabeza ajustado en forma apropiada."], correcta: 3 },
            { 
            pregunta: '¿Qué significa esta luz de advertencia?<br><img src="https://raw.githubusercontent.com/xelitoxd7/cuestionario-clase-b/refs/heads/main/pregunta7.jpg" style="width: 100px; height: auto; display: block; margin: 10px auto;">', 
            opciones: ["Luces neblineras.", "Intermitentes de advertencia de peligro.", "Luces altas.", "Freno de mano puesto."], 
            correcta: 1 
            },
            { pregunta: "Es esencial que la presión de los neumáticos sea chequeada regularmente. ¿Cuándo se debe hacer esto?", opciones: ["Después de un viaje largo.", "Después de conducir a alta velocidad.", "Cuando los neumáticos están fríos.", "Cuando los neumáticos están calientes."], correcta: 2 },
            { pregunta: "La presión de los neumáticos debe revisarse:", opciones: ["Cuando los neumáticos están fríos.", "Cuando los neumáticos están calientes.", "En cualquier momento, porque da igual."], correcta: 0 },
            { pregunta: "¿Cuál de estos líquidos, en el caso de estar en un nivel bajo, podría causar un accidente?", opciones: ["El líquido de freno.", "El anticongelante.", "El agua de la batería.", "El líquido refrigerante."], correcta: 0 },
            { pregunta: "Frente a una situación normal, ¿cuál es la forma más segura de frenar?", opciones: ["Frenando fuerte, poniendo neutro y tirando freno de mano.", "Frenando suavemente con embrague y freno de mano.", "Poniendo neutro, frenando fuerte y soltando antes de detenerse.", "Frenando suavemente, luego un poco más fuerte y aflojando antes de detenerse."], correcta: 3 },
            { pregunta: "¿Cuándo usaría usted las luces intermitentes de advertencia de peligro?", opciones: ["Cuando esté en pana obstruyendo el tránsito.", "Cuando se estacione en doble fila.", "Cuando estacione junto a una cuneta con línea amarilla.", "Cuando sus señalizadores de viraje no funcionen."], correcta: 0 },
            { pregunta: "Las luces de advertencia de peligro deberían ser usadas:", opciones: ["Cuando estaciona en doble fila.", "Para advertir a quienes vienen atrás de un peligro adelante.", "Para advertir a quienes vienen detrás suyo que pretende virar.", "Para advertir a los demás que usted tiene prisa."], correcta: 1 },
            { pregunta: "¿Cuándo usaría usted las luces de advertencia de peligro de su vehículo?", opciones: ["Cuando esté en pana moviéndose lentamente.", "Cuando esté siendo remolcado.", "Cuando esté retrocediendo en una calle de poco tránsito.", "Cuando esté en pana y obstaculizando el tránsito."], correcta: 3 },
            { pregunta: "Usted está probando la suspensión de su vehículo cuando nota que éste rebota u oscila al cargarlo en un extremo lateral frontal. ¿Qué significa esto?", opciones: ["Neumáticos gastados.", "Neumáticos poco inflados.", "Volante de dirección no centrado.", "Amortiguadores gastados."], correcta: 3 },
            { 
              pregunta: "¿Por qué los neumáticos deben mantenerse a la presión indicada por el fabricante?", 
              opciones: ["Para que el vehículo se mantenga a la altura correcta sobre la vía.", "Para no desgastar el motor.", "Para ayudar a evitar que el automóvil se roncee.", "Para evitar que el automóvil se incline hacia un lado."], 
              correcta: 2 
            },
        
            ];
            


        function limpiarMenu() { document.getElementById('menu').style.display = 'none'; }
        
        function iniciarCuestionario() { limpiarMenu(); mostrarPreguntas(bancoDePreguntas); }
        
        function preguntasAlAzar() { limpiarMenu(); const seleccion = [...bancoDePreguntas].sort(() => 0.5 - Math.random()).slice(0, 10); mostrarPreguntas(seleccion); }

        function mostrarPreguntas(lista) {
            let html = "";
            lista.forEach((p, index) => {
                html += `<div class="pregunta" id="pregunta-${index}">
                    <p><strong>${index + 1}. ${p.pregunta}</strong></p>`;
                p.opciones.forEach((op, i) => {
                    html += `<input type="radio" name="p${index}" value="${i}"> ${op}<br>`;
                });
                html += `<br><span class="feedback" id="feedback-${index}"></span>
                        </div>`;
            });
            html += `<button id="btn-calificar" onclick="verificar()">Calificar</button>`;
            document.getElementById('contenedor-preguntas').innerHTML = html;
            document.getElementById('contenedor-botones-finales').innerHTML = '';
        }

        function verificar() {
            bancoDePreguntas.forEach((p, index) => {
                const seleccionada = document.querySelector(`input[name="p${index}"]:checked`);
                const feedback = document.getElementById(`feedback-${index}`);
                if (seleccionada) { feedback.innerHTML = (parseInt(seleccionada.value) === p.correcta) ? " ✅ Correcto" : " ❌ Incorrecto"; } 
                else { feedback.innerHTML = " (No contestada) ❌"; }
            });
            document.getElementById('btn-calificar').style.display = 'none';
            document.getElementById('contenedor-botones-finales').innerHTML = `<br><button onclick="iniciarCuestionario()">Volver a intentar</button>`;
        }
    </script>
</body>
</html>
