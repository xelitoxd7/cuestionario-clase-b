<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuestionario Clase B</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        .pregunta { margin-bottom: 25px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; }
        .aviso { font-weight: bold; color: #d35400; font-size: 0.9em; }
        #selector-container { display: none; position: fixed; top: 20px; right: 20px; z-index: 1000; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        #menu { margin-top: 50px; padding: 20px; background: #f4f4f4; border-radius: 8px; }
        .feedback { font-size: 1.2em; font-weight: bold; margin-top: 10px; display: block; }
        img { max-width: 100px; height: auto; display: block; margin: 10px auto; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="selector-container">
        <label for="cantidad">Preguntas:</label>
        <select id="cantidad" onchange="iniciarCuestionario()">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="all">Todas</option>
        </select>
    </div>

    <h1>CUESTIONARIO CLASE B</h1>
    
    <div id="menu">
        <button onclick="iniciarCuestionario()">Iniciar Cuestionario</button>
    </div>

    <div id="contenedor-preguntas"></div>
    <div id="contenedor-botones-finales"></div>

    <script>
        const bancoDePreguntas = [
            { pregunta: "Su vehículo se desvía hacia un lado cuando usted frena. Usted debería:", opciones: ["Cambiar los neumáticos.", "Bombear el pedal.", "Usar freno de mano.", "Consultar con su mecánico."], c: [3], tipo: "una" },
            { pregunta: "Su vehículo se desvía hacia un lado cuando usted frena. ¿Falla más probable?", opciones: ["Nivel líquido.", "Freno mano puesto.", "Frenos mal ajustados.", "Presión neumáticos."], c: [2], tipo: "una" },
            { pregunta: "Mientras conduce siente un fuerte olor a gasolina. ¿Qué debe hacer?", opciones: ["No preocuparse.", "Velocidad reducida.", "Continuar.", "Detenerse e investigar."], c: [3], tipo: "una" },
            { pregunta: "¿Cómo puede prevenir usted el riesgo de incendio de su vehículo?", opciones: ["Niveles agua.", "Estanque lleno.", "Gasolina sin plomo.", "Revisar olor a gasolina."], c: [3], tipo: "una" },
            { pregunta: "¿Por qué es importante usar zapatos apropiados cuando conduce?", opciones: ["Control de pedales.", "Desgaste gomas.", "Cambios rápido.", "Caminar mejor."], c: [0], tipo: "una" },
            { pregunta: "En un automóvil, ¿cuál de los siguientes elementos reduce el riesgo de lesiones de cuello en una colisión?", opciones: ["Air-bag.", "Frenos ABS.", "Columna dirección.", "Apoya-cabeza."], c: [3], tipo: "una" },
            { pregunta: '¿Qué significa esta luz de advertencia?<br><img src="https://raw.githubusercontent.com/xelitoxd7/cuestionario-clase-b/refs/heads/main/pregunta7.jpg">', opciones: ["Neblineras.", "Advertencia peligro.", "Luces altas.", "Freno mano."], c: [1], tipo: "una" },
            { pregunta: "Es esencial que la presión de los neumáticos sea chequeada regularmente. ¿Cuándo?", opciones: ["Viaje largo.", "Alta velocidad.", "Neumáticos fríos.", "Neumáticos calientes."], c: [2], tipo: "una" },
            { pregunta: "La presión de los neumáticos debe revisarse:", opciones: ["Fríos.", "Calientes.", "Cualquier momento."], c: [0], tipo: "una" },
            { pregunta: "¿Cuál de estos líquidos, en el caso de estar bajo, podría causar accidente?", opciones: ["Líquido freno.", "Anticongelante.", "Agua batería.", "Refrigerante."], c: [0], tipo: "una" },
            { pregunta: "Frente a situación normal, ¿forma más segura de frenar?", opciones: ["Freno fuerte.", "Suave con embrague.", "Neutro.", "Progresivo."], c: [3], tipo: "una" },
            { pregunta: "¿Cuándo usaría las luces intermitentes de advertencia?", opciones: ["Pana obstruyendo.", "Doble fila.", "Línea amarilla.", "Señalizadores malos."], c: [0], tipo: "una" },
            { pregunta: "Las luces de advertencia de peligro deberían ser usadas:", opciones: ["Doble fila.", "Advertir peligro.", "Virar.", "Prisa."], c: [1], tipo: "una" },
            { pregunta: "¿Cuándo usaría las luces de advertencia de peligro?", opciones: ["Pana lenta.", "Remolcado.", "Retrocediendo.", "Pana obstruyendo."], c: [3], tipo: "una" },
            { pregunta: "Suspension rebota u oscila al cargar. ¿Qué significa?", opciones: ["Neumáticos gastados.", "Neumáticos poco inflados.", "Volante mal.", "Amortiguadores gastados."], c: [3], tipo: "una" },
            { pregunta: "¿Por qué los neumáticos deben mantenerse a la presión indicada?", opciones: ["Altura.", "Desgastar motor.", "Evitar ronceo.", "Inclinación."], c: [2], tipo: "una" },
            { pregunta: "¿A qué se debe un alto consumo de combustible?", opciones: ["Dirección.", "Aceleración curvas.", "Frenadas y aceleraciones.", "Marchas altas."], c: [2], tipo: "una" },
            { pregunta: "Profundidad surcos no debería ser inferior a:", opciones: ["5.0 mm", "4.0 mm", "1.6 mm", "1.0 mm"], c: [2], tipo: "una" },
            { pregunta: "Uno de sus neumáticos traseros se revienta. ¿Qué debe hacer?", opciones: ["Poner marcha atrás.", "Señal de detención/disminuir velocidad.", "Detenerse lentamente.", "Frenar a fondo."], c: [1, 2], tipo: "varias" },
            { pregunta: "¿Qué debe hacer si se le revienta un neumático delantero?", opciones: ["Cambiarse pista.", "Frenar suave/seguir.", "Frenar firme.", "Sostener firme el volante."], c: [1, 3], tipo: "varias" },
            { pregunta: "¿Qué es lo que nunca debería hacer en una bomba de bencina?", opciones: ["Circular.", "Fumar.", "Comer.", "Lavar."], c: [1], tipo: "una" },
            { pregunta: "Desenganchar el motor del vehículo...", opciones: ["Mejor control.", "Maniobras.", "Más consumo.", "Reduce control."], c: [3], tipo: "una" },
            { pregunta: "¿Por qué no es bueno desenganchar el motor al ir circulando?", opciones: ["Resbala.", "Motor se detiene.", "No hay frenado motor.", "Motor rápido."], c: [2], tipo: "una" },
            { pregunta: "¿Por qué no debe desengancharse el motor al ir cuesta abajo?", opciones: ["Menor control frenado/dirección.", "Velocidad.", "Consumo.", "Daño neumáticos.", "Daño motor."], c: [0, 3], tipo: "varias" },
{ pregunta: "¿Por qué usted no debería conducir presionando el pedal de embrague durante más tiempo que el necesario?", opciones: ["Reduce control.", "Desgaste caja.", "Aumenta consumo.", "Reduce agarre."], c: [0], tipo: "una" },
{ pregunta: "¿Para qué sirven los seguros de niños de los vehículos?", opciones: ["Hebillas.", "Puertas no abran interior.", "Ventanas.", "Asientos."], c: [1], tipo: "una" },
{ pregunta: "Una baja presión de aire en los neumáticos delanteros...", opciones: ["Torcer.", "Rendimiento.", "Liviana.", "Pesada."], c: [3], tipo: "una" },
{ pregunta: "En un pavimento mojado, ¿influye el estado de los neumáticos en la distancia de frenado?", opciones: ["No, solo velocidad.", "No, siempre igual.", "Sí, menor desgaste menor distancia.", "Sí, factores determinan."], c: [3], tipo: "una" },
{ 
    pregunta: '¿Cuál o cuáles de las siguientes afirmaciones es(son) verdadera(s)?<br><img src="https://raw.githubusercontent.com/xelitoxd7/cuestionario-clase-b/refs/heads/main/pregunta38.jpg" style="width: 100px; height: auto; display: block; margin: 10px auto;">', 
    opciones: ["Adulto + niño.", "Cinturón reduce lesión.", "Trasero sin seguridad.", "Cinturón tenso."], 
    c: [1, 3], 
    tipo: "varias" 
},

{ pregunta: "¿Cuáles 2 de las siguientes afirmaciones son verdaderas?", opciones: ["Gases no peligrosos.", "Escape oxidado CO.", "Gases incoloros.", "Vapores gasolina inocuos."], c: [1, 2], tipo: "varias" },
{ pregunta: "¿Cuáles 2 de las siguientes afirmaciones son verdaderas?", opciones: ["Consumo líquido.", "Frenos ABS.", "Consumo líquido dependiente.", "Líquido no se consume.", "Pedal elástico."], c: [1, 3], tipo: "varias" },
{ pregunta: "¿Cuál o cuáles de las siguientes afirmaciones es(son) verdadera(s)?", opciones: ["1mm siempre.", "Desgaste central.", "Problemas alineamiento.", "Estabilidad mejores adelante."], c: [1, 2], tipo: "varias" },
{ pregunta: "¿Cuál o cuáles de las siguientes afirmaciones es(son) verdadera(s)?", opciones: ["Cinturón reduce lesiones.", "Air-bag reemplaza.", "Trasero sin utilidad.", "Carreteras únicamente."], c: [0, 1, 2], tipo: "varias" },
{ pregunta: "¿Cuál o cuáles de las siguientes afirmaciones es(son) verdadera(s)?", opciones: ["Adulto + niño.", "Cinturón reduce lesión.", "Trasero sin seguridad.", "Cinturón tenso."], c: [1, 3], tipo: "varias" },
{ pregunta: "¿Qué elementos de su vehículo debe usted mantener limpios?", opciones: ["Luces.", "Espejos.", "Neumáticos.", "Vidrios."], c: [0, 1, 3], tipo: "varias" },
{ pregunta: "Distancia reacción 10m, frenado 8m, total 18m. ¿Distancia total al doble de velocidad?", opciones: ["46m", "52m", "64m", "78m"], c: [2], tipo: "una" },
{ pregunta: "¿Cuál de las siguientes es falsa al aumentar velocidad de 30 a 60 km/h?", opciones: ["Energía cinética x2.", "Energía cinética x4.", "Distancia reacción x2.", "Distancia frenado x4."], c: [0], tipo: "una" },
{ pregunta: "Auto azul 70km/h, rojo 90km/h. ¿Dónde es más probable que se encuentren?", opciones: ["Rojo estima 3.", "Rojo estima 2.", "Rojo estima 1.", "Azul estima 3."], c: [0, 3], tipo: "varias" },
{ pregunta: "¿Qué distancia de detención tiene un tren a 100 km/h?", opciones: ["100m", "200m", "800-1000m", "2000m+"], c: [2], tipo: "una" },
{ pregunta: "¿Qué es lo más importante para evitar chocar al vehículo que va adelante?", opciones: ["Frenos eficientes.", "Velocidad constante.", "Distancia separación.", "Neumáticos."], c: [2], tipo: "una" },
{ pregunta: "A 50 km/h, condiciones buenas, frenado aproximado:", opciones: ["50m", "15m", "10m", "30m"], c: [3], tipo: "una" },
{ pregunta: "Distancia mínima de detención en asfalto seco a 90 km/h:", opciones: ["50m", "70m", "30m", "120m"], c: [1], tipo: "una" },
{ pregunta: "Distancia aproximada de detención a 70 km/h:", opciones: ["15m", "80m", "45m", "25m"], c: [2], tipo: "una" },
{ pregunta: "Estacionar en bajada con pendiente pronunciada. ¿Qué hacer?", opciones: ["Detrás auto.", "Dos ruedas vereda.", "Girar ruedas hacia acera.", "Freno mano."], c: [2, 3], tipo: "varias" },
{ pregunta: "Descendiendo pendiente muy larga, ¿qué hacer para controlar velocidad?", opciones: ["Manubrio firme.", "Marcha baja.", "Neutro.", "Embrague."], c: [1], tipo: "una" },
{ pregunta: "Virando a la derecha en camino resbaladizo, ruedas traseras a la izquierda. ¿Qué hacer?", opciones: ["Frenar firme.", "Guiar izquierda suave.", "Embrague.", "Girar derecha."], c: [1], tipo: "una" },
{ pregunta: "Descendiendo pendiente pronunciada. ¿Qué hacer para controlar velocidad?", opciones: ["Cambio bajo usar frenos poco.", "Cambio alto usar frenos poco.", "Cambio alto usar frenos firme.", "Cambio bajo evitar frenos."], c: [0], tipo: "una" },
{ pregunta: "Distancia de frenado a 90 km/h:", opciones: ["45m", "70m", "20m", "15m"], c: [1], tipo: "una" }

        ];


        let preguntasActuales = [];

        function iniciarCuestionario() {
            document.getElementById('selector-container').style.display = 'block';
            document.getElementById('menu').style.display = 'none';
            document.getElementById('contenedor-botones-finales').innerHTML = '';
            
            let cantidad = document.getElementById('cantidad').value;
            preguntasActuales = [...bancoDePreguntas];

            if (cantidad !== 'all') {
                preguntasActuales = preguntasActuales.slice(0, parseInt(cantidad));
            }

            let html = "";
            preguntasActuales.forEach((p, index) => {
                let aviso = p.tipo === "una" ? "Marque una opción" : "Marque las opciones correctas";
                html += `<div class="pregunta" id="pregunta-${index}">
                    <p><strong>${index + 1}. ${p.pregunta}</strong> <br><span class="aviso">(${aviso})</span></p>`;
                p.opciones.forEach((op, i) => {
                    html += `<input type="checkbox" name="p${index}" value="${i}"> ${op}<br>`;
                });
                html += `<span class="feedback" id="feedback-${index}"></span></div>`;
            });
            
            html += `<button type="button" id="btn-calificar" onclick="verificar()">Calificar</button>`;
            document.getElementById('contenedor-preguntas').innerHTML = html;
        }

        function verificar() {
            preguntasActuales.forEach((p, index) => {
                const marcadas = Array.from(document.querySelectorAll(`input[name="p${index}"]:checked`)).map(el => parseInt(el.value));
                const feedback = document.getElementById(`feedback-${index}`);
                const correcta = p.c.every(c => marcadas.includes(c)) && marcadas.length === p.c.length;
                feedback.innerHTML = correcta ? " ✅ Correcto" : " ❌ Incorrecto";
            });
            
            document.getElementById('btn-calificar').style.display = 'none';
            // AQUÍ ESTÁ EL CAMBIO: Llama a iniciarCuestionario en lugar de recargar la página
            document.getElementById('contenedor-botones-finales').innerHTML = `<button onclick="iniciarCuestionario()">Reiniciar</button>`;
        }
    </script>
</body>
</html>
