<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuestionario Clase B</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .pregunta { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        #menu { margin-bottom: 20px; padding: 20px; background: #f4f4f4; border-radius: 8px; }
        .feedback { font-size: 1.5em; margin-left: 10px; }
    </style>
</head>
<body>

    <h1>CUESTIONARIO CLASE B</h1>

    <div id="menu">
        <button onclick="iniciarCuestionario()">Iniciar Cuestionario Completo</button>
        <button onclick="preguntasAlAzar()">Preguntas al azar (10)</button>
    </div>

    <div id="contenedor-preguntas"></div>
    <div id="contenedor-botones-finales"></div>

    <script>
        const bancoDePreguntas = [
            {
                pregunta: "Su vehículo se desvía hacia un lado cuando usted frena. Usted debería:",
                opciones: ["Cambiar los neumáticos de un lado hacia el otro y viceversa.", "Bombear el pedal al frenar.", "Usar su freno de mano.", "Consultar con su mecánico lo antes posible."],
                correcta: 3
            },
            {
                pregunta: "Su vehículo se desvía hacia un lado cuando usted frena. ¿Cuál es la falla más probable?",
                opciones: ["Un bajo nivel del líquido de frenos.", "Su freno de mano está todavía puesto.", "Frenos mal ajustados.", "Neumáticos con presión de aire inadecuada."],
                correcta: 2
            },
            {
            pregunta: "Mientras conduce usted siente un fuerte olor a gasolina. ¿Qué debería hacer usted?",
            opciones: ["No preocuparse, ya que sólo son los gases de escape.", "Continuar a una velocidad reducida.", "Continuar porque sabe que se detendrá algunos kilómetros más allá.", "Detenerse e investigar el problema."],
            correcta: 3
            },
            {
            pregunta: "¿Cómo puede prevenir usted el riesgo de incendio de su vehículo?",
            opciones: ["Manteniendo los niveles de agua sobre el máximo.", "Evitando conducir con el estanque lleno de combustible.", "Usando gasolina sin plomo.", "Revisando su vehículo ante cualquier olor a gasolina extraño."],
            correcta: 3
            },
            {
            pregunta: "¿Por qué es importante usar zapatos apropiados cuando conduce?",
        opciones: ["Para tener un adecuado control de los pedales.", "Para evitar el desgaste acelerado de las gomas de los pedales.", "Para poder efectuar los cambios de marcha más rápidamente.", "Para poder caminar sin problemas en el caso que necesite solicitar ayuda."],
            correcta: 0
            },
            {
            pregunta: "En un automóvil, ¿cuál de los siguientes elementos reduce el riesgo de lesiones de cuello en una colisión?",
            opciones: ["Un asiento dotado de air-bag.", "Los frenos ABS.", "Columna de dirección colapsable.", "Apoya-cabeza ajustado."],
            correcta: 3,
            },
            {
            pregunta: "¿Qué significa esta luz de advertencia en el panel de instrumentos?"
            opciones: ["Luces neblineras","Intermitentes de advertencia de peligro.","Luces altas.","Freno de mano puesto."],
            correcta: 2,
            imagen: "https://raw.githubusercontent.com/xelitoxd7/cuestionario-clase-b/refs/heads/main/pregunta7.png"
            },
            ];

        function limpiarMenu() { document.getElementById('menu').style.display = 'none'; }

        function iniciarCuestionario() {
            limpiarMenu();
            mostrarPreguntas(bancoDePreguntas);
        }

        function preguntasAlAzar() {
            limpiarMenu();
            const seleccion = [...bancoDePreguntas].sort(() => 0.5 - Math.random()).slice(0, 10);
            mostrarPreguntas(seleccion);
        }

        function mostrarPreguntas(lista) {
            let html = "";
            lista.forEach((p, index) => {
                html += `<div class="pregunta" id="pregunta-${index}">
                    <p><strong>${index + 1}. ${p.pregunta}</strong></p>`;
                p.opciones.forEach((op, i) => {
                    html += `<input type="radio" name="p${index}" value="${i}"> ${op}<br>`;
                });
                html += `<span class="feedback" id="feedback-${index}"></span>
                        </div>`;
            });
            html += `<button id="btn-calificar" onclick="verificar()">Calificar</button>`;
            document.getElementById('contenedor-preguntas').innerHTML = html;
        }

        function verificar() {
            // Buscamos mostrar el resultado basándonos en la posición original de las preguntas
            // Nota: Esto funciona bien con "Iniciar Cuestionario". 
            // Si usas "Al azar", comparará con la respuesta correcta global.
            bancoDePreguntas.forEach((p, index) => {
                const seleccionada = document.querySelector(`input[name="p${index}"]:checked`);
                const feedback = document.getElementById(`feedback-${index}`);
                
                if (seleccionada) {
                    feedback.innerHTML = (parseInt(seleccionada.value) === p.correcta) ? " ✅" : " ❌";
                } else {
                    feedback.innerHTML = " (No contestada) ❌";
                }
            });
            
            document.getElementById('btn-calificar').style.display = 'none';
            document.getElementById('contenedor-botones-finales').innerHTML = 
                `<button onclick="reiniciarSinMenu()">Reiniciar Cuestionario</button>`;
        }

        function reiniciarSinMenu() {
            const inputs = document.querySelectorAll('input[type="radio"]');
            inputs.forEach(input => input.checked = false);
            const feedbacks = document.querySelectorAll('.feedback');
            feedbacks.forEach(f => f.innerHTML = "");
            document.getElementById('btn-calificar').style.display = 'inline-block';
            document.getElementById('contenedor-botones-finales').innerHTML = "";
        }
    </script>
</body>
</html>
